services:

  # ── Jenkins CI/CD server ─────────────────────────────────────────────────────
  # Access at: http://localhost:8080
  # Initial admin password: docker compose logs jenkins | grep "Please use"
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root                          # needed to access Docker socket
    ports:
      - "8080:8080"                     # Jenkins web UI
      - "50000:50000"                   # Jenkins agent port
    volumes:
      - jenkins_home:/var/jenkins_home  # persist jobs, config, plugins
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
      - /usr/bin/docker:/usr/bin/docker            # Docker CLI inside Jenkins
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    restart: unless-stopped

  # ── Streamlit app ────────────────────────────────────────────────────────────
  # Access at: http://localhost:8501
  app:
    build: .
    container_name: finance-tracker-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
    depends_on: []

volumes:
  jenkins_home:
